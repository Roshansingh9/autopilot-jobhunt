name: "Configure Job Hunt"
description: >
  Create config.json from config.example.json and inject API keys + candidate
  profile. Shared by both scan-batch and merge jobs so configuration is never
  duplicated.

inputs:
  tinyfish-api-key:
    description: "TinyFish API key"
    required: true
  openrouter-api-key:
    description: "OpenRouter API key"
    required: true
  min-score:
    description: "Minimum LLM score to consider a job worth applying to"
    required: false
    default: "80"
  top-n:
    description: "Number of top jobs to surface in Telegram"
    required: false
    default: "5"

runs:
  using: "composite"
  steps:

    - name: Create config.json
      shell: bash
      run: cp config.example.json config.json

    - name: Configure Candidate Profile
      shell: bash
      env:
        TINYFISH_API_KEY:   ${{ inputs.tinyfish-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        MIN_SCORE:          ${{ inputs.min-score }}
        TOP_N:              ${{ inputs.top-n }}
      run: |
        python - <<'PYEOF'
        import json, os
        with open("config.json") as f:
            cfg = json.load(f)

        cfg["tinyfish_api_key"]        = os.environ["TINYFISH_API_KEY"]
        cfg["openrouter_api_key"]      = os.environ["OPENROUTER_API_KEY"]
        cfg["llm_inter_request_delay"] = 3   # seconds between LLM calls
        cfg["batch_timeout_minutes"]   = 7   # stop before GitHub cancels the runner

        cfg["candidate"].update({
            "name":            "Roshan Kumar Singh",
            "resume_path":     "resume/RESUME.md",
            "profile":         (
                "2026 Computer Science graduate with strong foundations in "
                "Data Structures, Algorithms, Object-Oriented Design, Operating Systems, "
                "Databases, Computer Networks, Distributed Systems, and scalable backend "
                "development. Experienced building production software using Python, C++, "
                "Java, FastAPI, PostgreSQL, Redis, and AWS through internships and projects."
            ),
            "seeking":         (
                "Software Engineer, Software Development Engineer (SDE), Backend Engineer, "
                "Platform Engineer, Infrastructure Engineer, AI Engineer, "
                "Machine Learning Engineer, Member of Technical Staff (MTS). "
                "India and Remote."
            ),
            "not_suitable":    (
                "Senior, Staff, Principal, Lead, Manager, Director, VP roles. "
                "Non-engineering: Marketing, Sales, HR, Finance, Design, Operations."
            ),
            "relocation_note": "Open to relocation within India and remote opportunities.",
            "min_score":       int(os.environ.get("MIN_SCORE", "80")),
            "top_n":           int(os.environ.get("TOP_N", "5")),
        })

        with open("config.json", "w") as f:
            json.dump(cfg, f, indent=2)

        print("=== config.json configured ===")
        print(json.dumps(cfg["candidate"], indent=2))
        PYEOF
