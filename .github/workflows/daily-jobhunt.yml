```yaml
name: Daily Job Hunt

on:
  workflow_dispatch:

  schedule:
    # 08:00 IST every day
    - cron: "30 2 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Create config.json
        run: cp config.example.json config.json

      - name: Configure config.json
        run: |
          python <<EOF
          import json

          with open("config.json") as f:
              cfg = json.load(f)

          # ---------------- API KEYS ----------------

          cfg["tinyfish_api_key"] = "${{ secrets.TINYFISH_API_KEY }}"
          cfg["openrouter_api_key"] = "${{ secrets.OPENROUTER_API_KEY }}"

          # ---------------- TELEGRAM ----------------

          cfg["telegram"]["token"] = "${{ secrets.TELEGRAM_TOKEN }}"
          cfg["telegram"]["chat_id"] = "${{ secrets.TELEGRAM_CHAT_ID }}"

          # ---------------- CANDIDATE ----------------

          c = cfg["candidate"]

          c["name"] = "Roshan Kumar Singh"

          c["resume_path"] = "resume/RESUME.md"

          c["profile"] = (
              "Backend-focused Software Engineer and 2026 Computer Science graduate. "
              "Strong in Python, FastAPI, PostgreSQL, Redis, AWS, distributed systems, "
              "algorithms and applied AI. "
              "Amazon ML Summer School Top 5%. "
              "CodeChef 4-Star (1805)."
          )

          c["seeking"] = (
              "Software Engineer, Backend Engineer, AI Engineer, "
              "Machine Learning Engineer. "
              "India and Remote only."
          )

          c["not_suitable"] = (
              "Senior/Staff/Principal roles requiring 5+ years of experience, "
              "non-technical roles, frontend-only roles, relocation-only roles outside India."
          )

          c["relocation_note"] = (
              "Open to relocation anywhere in India and remote opportunities."
          )

          c["min_score"] = 85
          c["top_n"] = 5

          with open("config.json", "w") as f:
              json.dump(cfg, f, indent=2)
          EOF

      - name: Verify Repository
        run: |
          echo "Repository Structure"
          ls -R

          echo ""
          echo "Resume"
          test -f resume/RESUME.md

          echo ""
          echo "Generated Config"
          cat config.json

      - name: Run Job Scanner
        run: |
          autopilot scan

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-results
          path: |
            output/**
            state/**
            config.json
```
