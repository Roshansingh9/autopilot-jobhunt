name: Daily Job Hunt

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"   # 08:00 IST daily

# ── Shared constants ──────────────────────────────────────────────────────────
# Change TOTAL_BATCHES here AND in the merge job's --total-batches flag below
# if you ever resize the pipeline.
env:
  TOTAL_BATCHES: "10"
  PYTHON_VERSION: "3.11"
  MIN_SCORE: "80"
  TOP_N: "5"

# ─────────────────────────────────────────────────────────────────────────────
# Sequential batch pipeline
#
#   batch_0 → batch_1 → batch_2 → … → batch_9 → merge
#
# Each job runs on a fresh runner.  Shared state (seen URLs) is persisted
# between DAILY RUNS via actions/cache.  Results for today's MERGE are
# passed via actions/upload-artifact / actions/download-artifact.
#
# "if: always()" on every job ensures one failing batch never aborts the chain.
# The merge job aggregates whatever artifacts are available.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Batch 0 ─────────────────────────────────────────────────────────────────
  batch_0:
    name: "Scan 0/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Kolkata
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "0"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 1 ─────────────────────────────────────────────────────────────────
  batch_1:
    name: "Scan 1/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_0]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "1"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 2 ─────────────────────────────────────────────────────────────────
  batch_2:
    name: "Scan 2/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_1]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "2"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 3 ─────────────────────────────────────────────────────────────────
  batch_3:
    name: "Scan 3/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_2]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "3"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 4 ─────────────────────────────────────────────────────────────────
  batch_4:
    name: "Scan 4/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_3]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "4"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 5 ─────────────────────────────────────────────────────────────────
  batch_5:
    name: "Scan 5/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_4]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "5"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 6 ─────────────────────────────────────────────────────────────────
  batch_6:
    name: "Scan 6/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_5]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "6"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 7 ─────────────────────────────────────────────────────────────────
  batch_7:
    name: "Scan 7/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_6]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "7"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 8 ─────────────────────────────────────────────────────────────────
  batch_8:
    name: "Scan 8/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_7]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "8"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Batch 9 ─────────────────────────────────────────────────────────────────
  batch_9:
    name: "Scan 9/10"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [batch_8]
    if: always()
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Inter-batch delay
        run: sleep 25
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: ./.github/actions/scan-batch
        with:
          batch-index:      "9"
          total-batches:    ${{ env.TOTAL_BATCHES }}
          tinyfish-api-key: ${{ secrets.TINYFISH_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          min-score:        ${{ env.MIN_SCORE }}
          top-n:            ${{ env.TOP_N }}

  # ── Merge & Notify ───────────────────────────────────────────────────────────
  # Runs after ALL batches regardless of pass/fail.
  # Downloads every available artifact, merges job lists, deduplicates,
  # sorts by score, and sends ONE Telegram message.
  merge:
    name: "Merge & Notify"
    runs-on: ubuntu-latest
    needs:
      - batch_0
      - batch_1
      - batch_2
      - batch_3
      - batch_4
      - batch_5
      - batch_6
      - batch_7
      - batch_8
      - batch_9
    if: always()
    timeout-minutes: 10
    env:
      TZ: Asia/Kolkata
      TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }

      - name: Install Dependencies
        run: pip install -e .

      - name: Download All Batch Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/        # layout: artifacts/batch-N/state_batch_N/last_scan.json

      - name: Show Downloaded Files
        run: find artifacts/ -type f | sort || true

      - name: Merge Results and Send Telegram
        run: |
          autopilot merge \
            --artifacts-dir artifacts/ \
            --total-batches ${{ env.TOTAL_BATCHES }} \
            --min-score     ${{ env.MIN_SCORE }} \
            --top-n         ${{ env.TOP_N }}

      - name: Upload Merged Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merged-results
          path: artifacts/
          if-no-files-found: warn
