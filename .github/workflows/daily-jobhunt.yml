```yaml
name: Daily Job Hunt

on:
  workflow_dispatch:

  schedule:
    - cron: "30 2 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Create config.json
        run: |
          cp config.example.json config.json

      - name: Configure config.json
        run: |
          python <<EOF
          import json

          with open("config.json") as f:
              cfg = json.load(f)

          cfg["tinyfish_api_key"] = "${{ secrets.TINYFISH_API_KEY }}"
          cfg["openrouter_api_key"] = "${{ secrets.OPENROUTER_API_KEY }}"

          cfg["telegram"]["token"] = "${{ secrets.TELEGRAM_TOKEN }}"
          cfg["telegram"]["chat_id"] = "${{ secrets.TELEGRAM_CHAT_ID }}"

          cfg["candidate"]["name"] = "Roshan Kumar Singh"
          cfg["candidate"]["resume_path"] = "resume/RESUME.md"

          cfg["candidate"]["profile"] = (
              "Backend-focused Software Engineer and 2026 Computer Science graduate. "
              "Strong in Python, FastAPI, PostgreSQL, Redis, AWS, distributed systems, "
              "algorithms and applied AI."
          )

          cfg["candidate"]["seeking"] = (
              "Software Engineer, Backend Engineer, AI Engineer, "
              "Machine Learning Engineer. India and Remote only."
          )

          cfg["candidate"]["not_suitable"] = (
              "Senior roles, Staff roles, Principal roles, "
              "non-technical roles and frontend-only roles."
          )

          cfg["candidate"]["relocation_note"] = (
              "Open to relocation anywhere in India and remote opportunities."
          )

          cfg["candidate"]["min_score"] = 85
          cfg["candidate"]["top_n"] = 5

          with open("config.json", "w") as f:
              json.dump(cfg, f, indent=2)

          print("========== GENERATED CONFIG ==========")
          print(json.dumps(cfg, indent=2))
          EOF

      - name: Verify Repository
        run: |
          echo "========== CURRENT DIRECTORY =========="
          pwd

          echo ""
          echo "========== FILES =========="
          ls -R

          echo ""
          echo "========== RESUME =========="
          test -f resume/RESUME.md

          echo ""
          echo "========== CONFIG =========="
          cat config.json

          echo ""
          echo "========== CANDIDATE =========="
          python - <<EOF
          import json
          with open("config.json") as f:
              cfg=json.load(f)
          print(cfg["candidate"])
          EOF

      - name: Run Job Scanner
        run: |
          autopilot scan

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-results
          path: |
            output/**
            state/**
            config.json
```
