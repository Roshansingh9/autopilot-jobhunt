
name: Daily Job Hunt

on:
  workflow_dispatch:

  schedule:
    - cron: "30 2 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: Asia/Kolkata
      TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Create config.json
        run: cp config.example.json config.json

      - name: Update config.json
        run: |
          python - <<'PYTHON'
          import json
          import os

          with open("config.json") as f:
              cfg = json.load(f)

          cfg["tinyfish_api_key"] = os.environ["TINYFISH_API_KEY"]
          cfg["openrouter_api_key"] = os.environ["OPENROUTER_API_KEY"]
          cfg["openrouter_model"] = "openrouter/free"

          cfg["telegram"]["token"] = os.environ["TELEGRAM_TOKEN"]
          cfg["telegram"]["chat_id"] = os.environ["TELEGRAM_CHAT_ID"]

          cfg["candidate"]["name"] = "Roshan Kumar Singh"
          cfg["candidate"]["resume_path"] = "resume/RESUME.md"
          cfg["candidate"]["profile"] = (
              "Backend-focused Software Engineer skilled in Python, FastAPI, "
              "PostgreSQL, Redis, AWS, Distributed Systems and Applied AI."
          )
          cfg["candidate"]["seeking"] = (
              "Software Engineer, Backend Engineer, AI Engineer, "
              "Machine Learning Engineer. India and Remote."
          )
          cfg["candidate"]["not_suitable"] = (
              "Senior, Staff, Principal, Manager, Director, Frontend-only roles."
          )
          cfg["candidate"]["relocation_note"] = (
              "Open to relocation within India and remote opportunities."
          )
          cfg["candidate"]["min_score"] = 80
          cfg["candidate"]["top_n"] = 5

          with open("config.json", "w") as f:
              json.dump(cfg, f, indent=2)

          print("===== GENERATED CONFIG =====")
          print(json.dumps(cfg["candidate"], indent=2))
          PYTHON

      - name: Verify Files
        run: |
          pwd
          ls -R
          echo "===== RESUME ====="
          ls -l resume
          echo "===== CONFIG ====="
          cat config.json

      - name: Run Scanner
        run: |
          python -m job_hunt.main scan

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-results
          path: |
            output/**
            state/**
            config.json
